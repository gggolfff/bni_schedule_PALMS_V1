# .github/workflows/bni-report-automation.yml

name: BNI PALMS Report Automation

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Schedule the workflow to run every Thursday at 11:45 AM UTC (6:45 PM Bangkok Time)
  schedule:
    - cron: '45 11 * * 4'

jobs:
  run-bni-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install Chromium dependencies required by Puppeteer
      - name: Install Chromium Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          ca-certificates \
          fonts-liberation \
          libasound2 \
          libatk-bridge2.0-0 \
          libatk1.0-0 \
          libc6 \
          libcairo2 \
          libcups2 \
          libdbus-1-3 \
          libexpat1 \
          libfontconfig1 \
          libgbm1 \
          libgcc1 \
          libglib2.0-0 \
          libgtk-3-0 \
          libnspr4 \
          libnss3 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libstdc++6 \
          libx11-6 \
          libx11-xcb1 \
          libxcb1 \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxext6 \
          libxfixes3 \
          libxi6 \
          libxrandr2 \
          libxrender1 \
          libxss1 \
          libxtst6 \
          lsb-release \
          wget \
          xdg-utils

      # Step 4: Install project dependencies (full puppeteer)
      - name: Install dependencies
        run: npm install puppeteer

      # Step 5: Run the Puppeteer script
      - name: Run BNI Automation Script
        run: node bni_pupeteer.js # Make sure this filename is correct
        env:
          # Note: The Browserless API key is no longer needed
          BNI_USERNAME: ${{ secrets.BNI_USERNAME }}
          BNI_PASSWORD: ${{ secrets.BNI_PASSWORD }}

      # Step 6: Upload the downloaded report as an artifact
      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bni-slips-audit-report
          path: downloads/
